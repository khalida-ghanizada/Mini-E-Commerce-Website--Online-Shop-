<!-- Contact Section -->
<section class="container mt-4">
    <h2 class="text-center mb-4">Contact Us</h2>

    <div class="row">
        <!-- Info -->
        <div class="col-md-5">
            <h4>Get in Touch</h4>
            <p><i class="fas fa-map-marker-alt"></i> Kabul, Afghanistan</p>
            <p><i class="fas fa-phone"></i> +93 790 000000</p>
            <p><i class="fas fa-envelope"></i> support@mini-e-commerce.com</p>
        </div>

        <!-- Form -->
        <div class="col-md-7">
            <form id="contactForm" novalidate class="needs-validation">

                <div class="mb-3">
                    <label for="name" class="form-label">Name</label>
                    <input type="text" id="name" class="form-control" required>
                    <div class="invalid-feedback">Please enter your name</div>
                </div>

                <div class="mb-3">
                    <label for="email" class="form-label">Email</label>
                    <input type="email" id="email" class="form-control" required>
                    <div class="invalid-feedback">Enter a valid email</div>
                </div>

                <div class="mb-3">
                    <label for="message" class="form-label">Message</label>
                    <textarea id="message" class="form-control" rows="4" required></textarea>
                    <div class="invalid-feedback">Message cannot be empty</div>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="fas fa-paper-plane"></i> Send Message
                </button>

                <p id="success-msg" class="text-success mt-2 text-center"></p>

            </form>
        </div>
    </div>
</section>
