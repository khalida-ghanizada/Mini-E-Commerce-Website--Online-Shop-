<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cart</title>

    <link rel="stylesheet" href="./css/style.css">
    <link rel="stylesheet" href="./bootstrap-5.3.8-dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="./fontawesome/css/all.min.css">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <i class="fas fa-store"></i> Mini E-Commerce
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navMenu">
            <ul class="navbar-nav ms-auto">
                <li class="nav-item"><a class="nav-link" href="index.html"><i class="fas fa-home"></i> Home</a></li>
                <li class="nav-item"><a class="nav-link" href="about.html"><i class="fas fa-info-circle"></i> About</a></li>
                <li class="nav-item"><a class="nav-link" href="contact.html"><i class="fas fa-envelope"></i> Contact</a></li>
                <li class="nav-item">
                    <a class="nav-link active" href="cart.html">
                        <i class="fas fa-shopping-cart"></i> Cart (<span id="cart-count">0</span>)
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<!-- Cart Section -->
<section class="container mt-4">
    <h2 class="text-center mb-4">Shopping Cart</h2>

    <div class="table-responsive">
        <table class="table table-bordered text-center">
            <thead class="table-dark">
                <tr>
                    <th>Product</th>
                    <th>Price</th>
                    <th>Quantity</th>
                    <th>Total</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="cart-items"></tbody>
        </table>
    </div>

    <h4 class="text-end">Grand Total: $<span id="total-price">0.00</span></h4>
</section>

<!-- Checkout Section -->
<section class="container mt-5">
    <h3 class="text-center mb-3">Checkout</h3>

    <form id="checkoutForm" class="needs-validation" novalidate>

        <div class="mb-2">
            <label class="form-label">Full Name</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">Name required</div>
        </div>

        <div class="mb-2">
            <label class="form-label">Email</label>
            <input type="email" class="form-control" required>
            <div class="invalid-feedback">Valid email required</div>
        </div>

        <div class="mb-2">
            <label class="form-label">Address</label>
            <input type="text" class="form-control" required>
            <div class="invalid-feedback">Address required</div>
        </div>

        <div class="mb-2">
            <label class="form-label">Card Number</label>
            <input type="text" class="form-control" pattern="\d{16}" maxlength="16"
                   placeholder="1234 5678 9012 3456" required>
            <div class="invalid-feedback">Enter a valid 16-digit card number</div>
        </div>

        <button class="btn btn-success w-100">Place Order</button>
    </form>
</section>
